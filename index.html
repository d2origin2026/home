<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>양지마을_전자서명_설명서</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa3b2;
    --accent: #4f8cff;
    --accent-hover: #3d79ee;
    --shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(15, 17, 21, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; white-space: nowrap;
  }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: grid; place-items: center; font-size: 15px;
  }
  .doc-title {
    color: var(--muted); font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  select, button {
    font: inherit; cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text);
    border-radius: 10px; padding: 8px 12px;
  }
  button { display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s; }
  button:hover:not(:disabled) { background: #272c36; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-label { display: inline; }
  select { max-width: 200px; }

  main { flex: 1; display: flex; flex-direction: column; }
  .viewer {
    flex: 1; padding: 20px 16px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .page-wrap {
    width: 100%; max-width: 900px;
    background: #fff; border-radius: 8px;
    box-shadow: var(--shadow); overflow: hidden; position: relative;
  }
  .page-wrap canvas { display: block; width: 100%; height: auto; }
  .page-num {
    position: absolute; bottom: 8px; right: 10px;
    background: rgba(0, 0, 0, 0.55); color: #fff;
    font-size: 12px; padding: 2px 8px; border-radius: 999px; pointer-events: none;
  }

  .message {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    gap: 14px; padding: 40px 24px; color: var(--muted);
  }
  .message .big-icon { font-size: 52px; line-height: 1; }
  .message h2 { margin: 0; color: var(--text); font-size: 19px; }
  .message p { margin: 0; font-size: 14px; max-width: 460px; line-height: 1.6; }
  .message code {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 6px; font-size: 13px; color: var(--text);
  }

  .status {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 16px; font-size: 13px; color: var(--muted);
    box-shadow: var(--shadow); z-index: 30; display: none;
  }
  .status.show { display: block; }
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    header { padding: 10px 12px; gap: 8px; }
    .brand span.title { display: none; }
    .btn-label { display: none; }
    button { padding: 8px 10px; }
    select { max-width: 130px; padding: 8px; }
    .viewer { padding: 12px 8px 50px; gap: 12px; }
    .page-wrap { border-radius: 6px; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">📄</span>
      <span class="title">양지마을 전자서명 설명서</span>
    </div>
    <span class="doc-title" id="docTitle"></span>
    <div class="actions">
      <select id="picker" class="hidden"></select>
      <button id="downloadBtn" disabled>
        <span>⬇️</span><span class="btn-label">다운로드</span>
      </button>
    </div>
  </header>

  <main>
    <div class="message" id="message">
      <div class="big-icon">⏳</div>
      <h2>불러오는 중…</h2>
    </div>
    <div class="viewer hidden" id="viewer"></div>
  </main>

  <div class="status" id="status"></div>

  <!--
    ▼▼▼ 설정: 이 블록만 수정하세요 ▼▼▼
    - 이 index.html은 어느 폴더 깊이에 두어도 동일하게 동작합니다.
    - js/app.js, pdf/ 는 "사이트 루트"에 1개씩만 두면 됩니다.
    - file 에는 pdf/ 폴더 안의 파일명만 적으세요.
  -->
  <script>
    window.PDF_CONFIG = {
      files: [
        { file: "guide.pdf", title: "가이드" },
        // { file: "다른문서.pdf", title: "다른 문서" },
      ],
      // js/app.js, pdf/ 를 찾기 위해 위로 올라갈 최대 단계 수
      maxDepth: 6,
    };
  </script>
  <!-- ▲▲▲ 설정 끝 ▲▲▲ -->

  <!-- 부트스트랩: 루트(js/app.js 위치)를 위로 탐색해 찾고 앱을 로드 -->
  <script>
    (async function () {
      const cfg = window.PDF_CONFIG || {};
      const maxDepth = Number.isInteger(cfg.maxDepth) ? cfg.maxDepth : 6;
      const messageEl = document.getElementById("message");

      let prefix = "", found = false;
      for (let i = 0; i <= maxDepth; i++) {
        try {
          const res = await fetch(prefix + "js/app.js", { method: "HEAD" });
          if (res.ok) { found = true; break; }
        } catch (e) { /* 무시하고 위로 */ }
        prefix += "../";
      }

      if (!found) {
        messageEl.innerHTML =
          '<div class="big-icon">⚠️</div><h2>js/app.js 를 찾지 못했어요</h2>' +
          '<p>사이트 루트에 <code>js/app.js</code> 가 있는지, 또는 위 <code>maxDepth</code> 값을 늘려보세요.</p>';
        return;
      }

      window.SITE_BASE = prefix; // 예: "" 또는 "../../"
      try {
        await import(prefix + "js/app.js");
      } catch (e) {
        console.error(e);
        messageEl.innerHTML =
          '<div class="big-icon">⚠️</div><h2>앱을 불러오지 못했어요</h2>' +
          '<p>브라우저 콘솔의 오류를 확인해 주세요.</p>';
      }
    })();
  </script>
</body>
</html>
